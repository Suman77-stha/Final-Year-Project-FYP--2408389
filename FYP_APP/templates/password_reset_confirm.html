{% extends "base.html" %}
{% block content %}

<div class="reset_container">

    <h2 class="reset_title">Reset Your Password</h2>

    {% if error %}
        <div class="text-danger">
            <div>{{ error }}</div>
        </div>
    {% endif %}

    <form action="{% url 'password_reset_confirm' user=username %}" method="POST" class="reset-form">

        {% csrf_token %}

        <div class="form-group">
            <label for="id_password1">New Password</label>
            <input type="password" name="password1" id="id_password1" placeholder="Enter password" required>
        </div>

        <div class="form-group">
            <label for="id_password2">Confirm Password</label>
            <input type="password" name="password2" id="id_password2" placeholder="Confirm password" required>
        </div>

        <button type="submit" class="btn_submit">Reset Password</button>
    </form>

    <div style="margin-top:15px; text-align:center;">
        <a href="{% url 'Sign_In' %}">Login Here</a>
    </div>

</div>

{% endblock content %}
