{% extends "base.html" %}
{% block title %} Trading Bot Dashboard {% endblock title%}
{% block content %}
{% load static %}
<div class="ai-container">

    <!-- HEADER -->
    <div class="ai-header">
        <div class="logo">TradeVision AI</div>
        <div class="controls">
            <i class="bx bx-microphone" id="mic-btn"></i>
            <i class="bx bx-cog"></i>
        </div>
    </div>

    <!-- CHAT AREA -->
    <div class="chat-box" id="chat-box">

        <div class="message ai">
            <div class="bubble">Hello 👋 I am your AI trading assistant. How can I help?</div>
        </div>

        <div class="message user">
            <div class="bubble">Show me best stocks today</div>
        </div>

    </div>

    <!-- INPUT AREA -->
    <div class="input-area">
        <input type="text" id="user-input" placeholder="Ask something...">
        <button onclick="sendMessage()">
            <i class="bx bx-send"></i>
        </button>
    </div>

</div>
{% endblock content %}
